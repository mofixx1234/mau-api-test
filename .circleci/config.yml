version: 2.1

orbs:
  node: circleci/node@5.2

jobs:
  build-and-test:
    docker:
      - image: cimg/node:22.11.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run tests
          command: npm test
      - run:
          name: Build TypeScript
          command: npm run build

  docker-build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Check Docker Hub credentials
          command: |
            test -n "$DOCKERHUB_USERNAME"
            test -n "$DOCKERHUB_TOKEN"
      - run:
          name: Login to Docker Hub
          command: echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run:
          name: Build Docker image
          command: |
            IMAGE_NAME="$DOCKERHUB_USERNAME/express-ts-nest-like-api"
            docker build \
              -t "$IMAGE_NAME:latest" \
              -t "$IMAGE_NAME:$CIRCLE_SHA1" \
              .
      - run:
          name: Push Docker image
          command: |
            IMAGE_NAME="$DOCKERHUB_USERNAME/express-ts-nest-like-api"
            docker push "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:$CIRCLE_SHA1"

workflows:
  build-test-and-publish:
    jobs:
      - build-and-test
      - docker-build-and-push:
          requires:
            - build-and-test
          filters:
            branches:
              only:
                - main
                - master
